<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worldwide Mission Critical — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal: #68ccd1;
      --dark-teal: #08485d;
      --blue: #0fa0d7;
      --navy: #195093;
      --coral: #f26554;
      --charcoal: #333333;
      --gray: #666666;
      --light-gray: #777777;
      --white: #ffffff;
    }

    body {
      font-family: 'Source Sans Pro', Helvetica, Arial, sans-serif;
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--white);
      overflow: hidden;
      position: relative;
    }

    /* Subtle background accent */
    body::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(104, 204, 209, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -15%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(15, 160, 215, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 340px;
      max-width: 90%;
      margin-bottom: 3rem;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: var(--teal);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--charcoal);
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.15rem;
      color: var(--light-gray);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .contact-link {
      display: inline-block;
      padding: 0.75rem 2.5rem;
      border: 2px solid var(--teal);
      color: var(--dark-teal);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 3px;
      transition: background 0.3s, color 0.3s;
    }

    .contact-link:hover {
      background: var(--teal);
      color: var(--white);
    }

    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.85rem;
      color: var(--light-gray);
      z-index: 1;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.75rem;
        letter-spacing: 0.1em;
      }

      .logo {
        width: 260px;
        margin-bottom: 2rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      src="https://irp.cdn-website.com/d6a2fbc4/dms3rep/multi/WMC-Logo-CMYK-Transparent-01+%281%29.svg"
      alt="Worldwide Mission Critical"
      class="logo"
    >
    <div class="divider"></div>
    <h1>Coming Soon</h1>
    <p>
      We're building something new. Stay tuned for updates from
      Worldwide Mission Critical.
    </p>
    <a href="mailto:info@WorldwideMissionCritical.com" class="contact-link">
      Get in Touch
    </a>
  </div>
  <footer>
    &copy; 2026 Worldwide Mission Critical. All rights reserved.
  </footer>
</body>
</html>
